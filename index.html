<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="MorCSA is a game-style APCSA study site with mini questions, fill-in-the-blank code, explanations, and pixel-art mentors."
    />
    <title>MorCSA | APCSA Score-5 Quest</title>
    <script>
      if (
        window.location.protocol === 'file:' &&
        !window.location.pathname.endsWith('/dist/index.html')
      ) {
        window.location.replace('./dist/index.html');
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root">
      <div
        style="
          max-width: 720px;
          margin: 64px auto;
          padding: 24px;
          border-radius: 20px;
          border: 2px solid #d8e7f3;
          background: #ffffff;
          font-family: Arial, sans-serif;
          color: #183153;
          line-height: 1.6;
        "
      >
        <h1 style="margin-top: 0">MorCSA</h1>
        <p>
          If the app does not auto-open, launch it with <code>npm run dev</code>,
          <code>npm run preview</code>, or open
          <a href="./dist/index.html"><code>dist/index.html</code></a>
          after building.
        </p>
      </div>
    </div>
  </body>
</html>
