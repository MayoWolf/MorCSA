<!doctype html>
<html lang="en">
  <head>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"

      content="MorCSA is a game-style APCSA study site with mini questions, fill-in-the-blank code, explanations, and pixel-art mentors."
    />
    <title>MorCSA | APCSA Score-5 Quest</title>
    <script>
      (function () {
        var head = document.head;
        var isFile = window.location.protocol === 'file:';

        var style = document.createElement('link');
        style.rel = 'stylesheet';
        style.href = isFile ? './dist/assets/main.css' : '/src/styles.css';
        head.appendChild(style);

        var script = document.createElement('script');
        if (isFile) {
          script.defer = true;
          script.src = './dist/assets/main.js';
        } else {
          script.type = 'module';
          script.src = '/src/main.tsx';
        }
        head.appendChild(script);
      })();
    </script>
  </head>

    <div id="root">
      <div
        style="
          max-width: 720px;
          margin: 64px auto;
          padding: 24px;
          border-radius: 20px;
          border: 2px solid #d8e7f3;
          background: #ffffff;
          font-family: Arial, sans-serif;
          color: #183153;
          line-height: 1.6;
        "
      >
        <h1 style="margin-top: 0">MorCSA</h1>
        <p>
          Loading MorCSA...
        </p>
      </div>
    </div>
  </body>
</html>
